name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: release_notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md for ${GITHUB_REF_NAME}" || echo "No changes to commit"
          BRANCH=$(git branch -r --contains "${GITHUB_REF_NAME}" | grep -v HEAD | head -1 | sed 's|origin/||' | xargs)
          if [ -n "$BRANCH" ]; then
            git push origin HEAD:"$BRANCH"
          else
            git push origin HEAD:main
          fi

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  build:
    name: Build macOS DMG
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Import Developer ID certificate from secrets (if available)
      - name: Import signing certificate
        if: env.CERT_BASE64 != ''
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          # Decode certificate
          echo "$CERT_BASE64" | base64 --decode > certificate.p12

          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import certificate.p12 -P "$CERT_PASSWORD" -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Export identity name for later steps
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          rm certificate.p12

      - name: Build macOS app
        run: |
          # Use Developer ID if available, otherwise ad-hoc
          SIGN_IDENTITY="${CODESIGN_IDENTITY:--}"

          xcodebuild \
            -project GlavenGame.xcodeproj \
            -scheme GlavenGame \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="$SIGN_IDENTITY" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Codesign app bundle
        if: env.CODESIGN_IDENTITY != ''
        run: |
          APP_PATH="build/Build/Products/Release/Glaven.app"
          codesign --deep --force --verify --verbose \
            --sign "$CODESIGN_IDENTITY" \
            --entitlements GlavenGame.entitlements \
            --options runtime \
            "$APP_PATH"

          # Verify signature
          codesign --verify --deep --strict "$APP_PATH"
          echo "Code signing verified successfully"

      - name: Package DMG
        run: |
          TAG="${GITHUB_REF_NAME}"
          APP_PATH="build/Build/Products/Release/Glaven.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: Glaven.app not found at $APP_PATH"
            find build -name "*.app" -type d
            exit 1
          fi

          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/
          ln -s /Applications dmg_staging/Applications

          hdiutil create \
            -volname "Glaven" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            "Glaven-${TAG}.dmg"

      - name: Codesign DMG
        if: env.CODESIGN_IDENTITY != ''
        run: |
          TAG="${GITHUB_REF_NAME}"
          codesign --force --sign "$CODESIGN_IDENTITY" "Glaven-${TAG}.dmg"

      - name: Notarize DMG
        if: env.CODESIGN_IDENTITY != '' && env.NOTARIZE_APPLE_ID != ''
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          DMG="Glaven-${TAG}.dmg"

          echo "Submitting $DMG for notarization..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$NOTARIZE_APPLE_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --team-id "$NOTARIZE_TEAM_ID" \
            --wait \
            --timeout 600

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG"

          echo "Notarization complete"

      - name: Cleanup keychain
        if: always() && env.KEYCHAIN_PATH != ''
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: Glaven-*.dmg

  release:
    name: Create GitHub Release
    needs: [changelog, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE=""
          if echo "$TAG" | grep -qE '(-beta|-rc|-alpha)'; then
            PRERELEASE="--prerelease"
          fi

          gh release create "$TAG" \
            Glaven-*.dmg \
            --title "Glaven $TAG" \
            --notes-file release_notes.md \
            $PRERELEASE
