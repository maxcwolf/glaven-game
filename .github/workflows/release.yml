name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest --strip header
        env:
          OUTPUT: release_notes.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Generate full changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_REPO: ${{ github.repository }}

      - name: Commit CHANGELOG.md
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git commit -m "docs: update CHANGELOG.md for ${GITHUB_REF_NAME}" || echo "No changes to commit"
          BRANCH=$(git branch -r --contains "${GITHUB_REF_NAME}" | grep -v HEAD | head -1 | sed 's|origin/||' | xargs)
          if [ -n "$BRANCH" ]; then
            git push origin HEAD:"$BRANCH"
          else
            git push origin HEAD:main
          fi

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md

  build:
    name: Build macOS DMG
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import signing certificate
        env:
          CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          echo "$CERT_BASE64" | base64 --decode > /tmp/certificate.p12
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import /tmp/certificate.p12 -P "$CERT_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          rm /tmp/certificate.p12

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build macOS app
        run: |
          xcodebuild \
            -project GlavenGame.xcodeproj \
            -scheme GlavenGame \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            CODE_SIGN_IDENTITY="$CODESIGN_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_ENTITLEMENTS=GlavenGame.entitlements \
            OTHER_CODE_SIGN_FLAGS="--options runtime" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Verify code signature
        run: |
          APP_PATH="build/Build/Products/Release/GlavenGame.app"
          codesign --verify --deep --strict "$APP_PATH"
          echo "Code signature verified"

      - name: Package DMG
        run: |
          TAG="${GITHUB_REF_NAME}"
          APP_PATH="build/Build/Products/Release/GlavenGame.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: GlavenGame.app not found at $APP_PATH"
            find build -name "*.app" -type d
            exit 1
          fi

          mkdir -p dmg_staging
          cp -R "$APP_PATH" dmg_staging/
          ln -s /Applications dmg_staging/Applications

          hdiutil create \
            -volname "GlavenGame" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            "GlavenGame-${TAG}.dmg"

      - name: Codesign DMG
        run: |
          TAG="${GITHUB_REF_NAME}"
          codesign --force --sign "Developer ID Application: Max Wolf (A5QKST5K59)" "GlavenGame-${TAG}.dmg"

      - name: Notarize DMG
        env:
          NOTARIZE_APPLE_ID: ${{ secrets.NOTARIZE_APPLE_ID }}
          NOTARIZE_PASSWORD: ${{ secrets.NOTARIZE_PASSWORD }}
          NOTARIZE_TEAM_ID: ${{ secrets.NOTARIZE_TEAM_ID }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          DMG="GlavenGame-${TAG}.dmg"

          echo "Submitting $DMG for notarization..."
          xcrun notarytool submit "$DMG" \
            --apple-id "$NOTARIZE_APPLE_ID" \
            --password "$NOTARIZE_PASSWORD" \
            --team-id "$NOTARIZE_TEAM_ID" \
            --wait \
            --timeout 600

          echo "Stapling notarization ticket..."
          xcrun stapler staple "$DMG"

          echo "Notarization complete"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: dmg
          path: GlavenGame-*.dmg

      - name: Cleanup
        if: always()
        run: |
          rm -rf build dmg_staging
          security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

  release:
    name: Create GitHub Release
    needs: [changelog, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes

      - name: Download DMG
        uses: actions/download-artifact@v4
        with:
          name: dmg

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PRERELEASE=""
          if echo "$TAG" | grep -qE '(-beta|-rc|-alpha)'; then
            PRERELEASE="--prerelease"
          fi

          gh release create "$TAG" \
            GlavenGame-*.dmg \
            --title "GlavenGame $TAG" \
            --notes-file release_notes.md \
            $PRERELEASE
